<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANICADE TECH | Agent Code Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #0B1C2D;
            --accent: #00BFFF;
            --gold: #C6A85C;
            --text: #F5F7FA;
            --text-light: #94A3B8;
            --border: rgba(255,255,255,0.07);
            --card-bg: rgba(15, 30, 48, 0.92);
            --green: #39ff14;
        }

        html, body {
            background: var(--primary);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== RINGS BG ===== */
        .rings-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .ring-el {
            position: absolute;
            top: 50%; left: 50%;
            border: 1.5px solid transparent;
            border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
            will-change: transform;
        }
        .ring-el:nth-child(1) { width: 900px; height: 900px; margin: -450px 0 0 -450px; border-color: rgba(0,191,255,0.06); animation: spin1 22s linear infinite; }
        .ring-el:nth-child(2) { width: 650px; height: 650px; margin: -325px 0 0 -325px; border-radius: 41% 44% 56% 59% / 38% 62% 63% 37%; border-color: rgba(198,168,92,0.05); animation: spin2 15s linear infinite; }
        .ring-el:nth-child(3) { width: 430px; height: 430px; margin: -215px 0 0 -215px; border-color: rgba(0,191,255,0.04); animation: spin1 32s linear infinite reverse; }
        @keyframes spin1 { to { transform: rotate(360deg); } }
        @keyframes spin2 { to { transform: rotate(-360deg); } }

        /* ===== BLOCKED SCREEN ===== */
        #blockedScreen {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: var(--primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 24px;
            gap: 16px;
        }
        #blockedScreen .block-icon { font-size: 52px; }
        #blockedScreen h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            color: var(--gold);
            letter-spacing: 2px;
        }
        #blockedScreen p {
            font-size: 15px;
            color: var(--text-light);
            max-width: 320px;
            line-height: 1.6;
        }
        #blockedScreen a {
            margin-top: 8px;
            display: inline-block;
            padding: 12px 32px;
            background: rgba(0,191,255,0.1);
            border: 1px solid rgba(0,191,255,0.3);
            border-radius: 50px;
            color: var(--accent);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        /* ===== MAIN CONTENT ===== */
        #mainContent {
            display: none;
            position: relative;
            z-index: 2;
            max-width: 680px;
            margin: 0 auto;
            padding: 80px 24px 60px;
        }

        /* header */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .page-eyebrow {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent);
            opacity: 0.7;
            margin-bottom: 12px;
        }
        .page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(198,168,92,0.3);
            margin-bottom: 8px;
        }
        .page-sub {
            font-size: 14px;
            color: var(--text-light);
        }
        .divider {
            width: 50px; height: 2px;
            background: linear-gradient(to right, var(--gold), var(--accent));
            margin: 16px auto 0;
            border-radius: 2px;
        }

        /* form card */
        .form-card {
            background: var(--card-bg);
            border: 1px solid rgba(198,168,92,0.15);
            border-radius: 20px;
            padding: 36px 32px;
            margin-bottom: 32px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        .form-row.full { grid-template-columns: 1fr; }

        .field label {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-light);
            margin-bottom: 8px;
        }
        .field input, .field select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.25s;
            -webkit-appearance: none;
        }
        .field input:focus, .field select:focus {
            border-color: rgba(0,191,255,0.4);
            box-shadow: 0 0 16px rgba(0,191,255,0.08);
        }
        .field input::placeholder { color: rgba(148,163,184,0.4); }
        .field select option { background: #0d2035; color: var(--text); }

        .generate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, rgba(198,168,92,0.2), rgba(0,191,255,0.15));
            border: 1px solid rgba(198,168,92,0.5);
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold);
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .generate-btn:hover {
            background: linear-gradient(135deg, rgba(198,168,92,0.35), rgba(0,191,255,0.25));
            box-shadow: 0 0 30px rgba(198,168,92,0.2);
            transform: translateY(-1px);
        }

        /* generated code display */
        #codeResult {
            display: none;
            background: rgba(57,255,20,0.05);
            border: 1px solid rgba(57,255,20,0.25);
            border-radius: 16px;
            padding: 28px 24px;
            text-align: center;
            margin-bottom: 32px;
            animation: fadeUp 0.4s ease both;
        }
        .code-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--green);
            opacity: 0.7;
            margin-bottom: 10px;
        }
        .code-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            font-weight: 900;
            color: var(--green);
            text-shadow: 0 0 30px rgba(57,255,20,0.4);
            letter-spacing: 4px;
            margin-bottom: 16px;
        }
        .code-details {
            font-size: 13px;
            color: var(--text-light);
            line-height: 1.9;
        }
        .code-details span { color: var(--text); font-weight: 600; }
        .copy-btn {
            margin-top: 18px;
            display: inline-block;
            padding: 10px 28px;
            background: rgba(57,255,20,0.1);
            border: 1px solid rgba(57,255,20,0.3);
            border-radius: 50px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--green);
            cursor: pointer;
            transition: all 0.2s;
        }
        .copy-btn:hover { background: rgba(57,255,20,0.2); }

        /* all codes list */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .list-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--gold);
        }
        .clear-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            letter-spacing: 1px;
            color: rgba(255,80,80,0.5);
            background: none;
            border: 1px solid rgba(255,80,80,0.2);
            border-radius: 6px;
            padding: 5px 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .clear-btn:hover { color: #ff5050; border-color: rgba(255,80,80,0.5); }

        #codesList { display: flex; flex-direction: column; gap: 10px; }

        .code-entry {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            transition: border-color 0.2s;
        }
        .code-entry:hover { border-color: rgba(198,168,92,0.2); }
        .entry-code {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 900;
            color: var(--green);
            letter-spacing: 2px;
            flex-shrink: 0;
        }
        .entry-info { flex: 1; min-width: 140px; }
        .entry-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 2px;
        }
        .entry-meta {
            font-size: 12px;
            color: var(--text-light);
            line-height: 1.5;
        }
        .entry-date {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            color: rgba(148,163,184,0.4);
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: rgba(148,163,184,0.3);
            font-size: 14px;
            border: 1px dashed rgba(255,255,255,0.06);
            border-radius: 12px;
        }
        .empty-state span {
            display: block;
            font-size: 32px;
            margin-bottom: 10px;
        }

        /* footer */
        .page-footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 24px;
            border-top: 1px solid rgba(198,168,92,0.08);
            font-size: 12px;
            color: rgba(148,163,184,0.3);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 500px) {
            .form-row { grid-template-columns: 1fr; }
            .form-card { padding: 24px 18px; }
            .code-value { font-size: 26px; letter-spacing: 2px; }
        }
    </style>
</head>
<body>

    <div class="rings-bg">
        <div class="ring-el"></div>
        <div class="ring-el"></div>
        <div class="ring-el"></div>
    </div>

    <!-- BLOCKED: shown if not logged in -->
    <div id="blockedScreen">
        <div class="block-icon">🔒</div>
        <h2>Access Restricted</h2>
        <p>You need to be logged in to access the Agent Code Generator. Please login first.</p>
        <a href="login.html">Go to Login</a>
    </div>

    <!-- MAIN CONTENT: shown if logged in -->
    <div id="mainContent">

        <div class="page-header">
            <div class="page-eyebrow">ANICADE TECH</div>
            <div class="page-title">Agent Code Generator</div>
            <div class="page-sub">Generate unique codes for new agents</div>
            <div class="divider"></div>
        </div>

        <!-- FORM -->
        <div class="form-card">
            <div class="form-row">
                <div class="field">
                    <label>First Name</label>
                    <input type="text" id="firstName" placeholder="e.g. Tresfor">
                </div>
                <div class="field">
                    <label>Last Name</label>
                    <input type="text" id="lastName" placeholder="e.g. Banda">
                </div>
            </div>
            <div class="form-row">
                <div class="field">
                    <label>Email Address</label>
                    <input type="email" id="agentEmail" placeholder="agent@email.com">
                </div>
                <div class="field">
                    <label>Phone Number</label>
                    <input type="tel" id="agentPhone" placeholder="+260 7XX XXX XXX">
                </div>
            </div>
            <div class="form-row full">
                <div class="field">
                    <label>Region / Location</label>
                    <select id="agentRegion">
                        <option value="" disabled selected>Select region...</option>
                        <option>Lusaka</option>
                        <option>Copperbelt</option>
                        <option>Central (Kabwe)</option>
                        <option>Eastern</option>
                        <option>Northern</option>
                        <option>Southern</option>
                        <option>Western</option>
                        <option>North-Western</option>
                        <option>Luapula</option>
                        <option>Muchinga</option>
                    </select>
                </div>
            </div>
            <div id="formError" style="color:#ff5050;font-size:13px;text-align:center;min-height:18px;margin-bottom:8px;"></div>
            <button class="generate-btn" onclick="generateCode()">⚡ Generate Agent Code</button>
        </div>

        <!-- GENERATED CODE DISPLAY -->
        <div id="codeResult">
            <div class="code-label">Agent Code Generated</div>
            <div class="code-value" id="displayCode">ANC-0001</div>
            <div class="code-details" id="displayDetails"></div>
            <button class="copy-btn" onclick="copyCode()">📋 Copy Code</button>
        </div>

        <!-- ALL CODES LIST -->
        <div class="list-header">
            <div class="list-title">ALL AGENT CODES (<span id="totalCount">0</span>)</div>
            <button class="clear-btn" onclick="confirmClear()">Clear All</button>
        </div>
        <div id="codesList"></div>

        <div class="page-footer">ANICADE TECH &nbsp;·&nbsp; AGENT PORTAL &nbsp;·&nbsp; INTERNAL USE ONLY</div>
    </div>

    <script>
        const STORAGE_KEY = 'anicade_agent_codes';

        // ===== ACCESS GUARD =====
        function isLoggedIn() {
            return !!localStorage.getItem('anicade_current_user');
        }

        window.addEventListener('DOMContentLoaded', function () {
            if (!isLoggedIn()) {
                document.getElementById('blockedScreen').style.display = 'flex';
                document.getElementById('mainContent').style.display = 'none';
            } else {
                document.getElementById('blockedScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                renderList();
            }
        });

        // ===== GET NEXT CODE NUMBER =====
        function getNextNumber() {
            const codes = getCodes();
            if (codes.length === 0) return 1;
            const numbers = codes.map(c => parseInt(c.code.replace('ANC-', ''), 10));
            return Math.max(...numbers) + 1;
        }

        function getCodes() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            } catch { return []; }
        }

        function saveCodes(codes) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(codes));
        }

        // ===== GENERATE =====
        function generateCode() {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName  = document.getElementById('lastName').value.trim();
            const email     = document.getElementById('agentEmail').value.trim();
            const phone     = document.getElementById('agentPhone').value.trim();
            const region    = document.getElementById('agentRegion').value;
            const errorEl   = document.getElementById('formError');

            errorEl.textContent = '';

            if (!firstName || !lastName || !email || !phone || !region) {
                errorEl.textContent = 'Please fill in all fields before generating.';
                return;
            }

            const num = getNextNumber();
            const padded = String(num).padStart(4, '0');
            const code = `ANC-${padded}`;
            const date = new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });

            const entry = { code, firstName, lastName, email, phone, region, date };

            // Save
            const codes = getCodes();
            codes.unshift(entry); // newest first
            saveCodes(codes);

            // Show result
            document.getElementById('displayCode').textContent = code;
            document.getElementById('displayDetails').innerHTML = `
                <span>${firstName} ${lastName}</span><br>
                📧 ${email}<br>
                📱 ${phone}<br>
                📍 ${region}<br>
                🗓️ ${date}
            `;
            const result = document.getElementById('codeResult');
            result.style.display = 'block';
            result.scrollIntoView({ behavior: 'smooth', block: 'center' });

            // Clear form
            document.getElementById('firstName').value = '';
            document.getElementById('lastName').value = '';
            document.getElementById('agentEmail').value = '';
            document.getElementById('agentPhone').value = '';
            document.getElementById('agentRegion').value = '';

            renderList();
        }

        // ===== COPY =====
        function copyCode() {
            const code = document.getElementById('displayCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = '✅ Copied!';
                setTimeout(() => btn.textContent = '📋 Copy Code', 2000);
            });
        }

        // ===== RENDER LIST =====
        function renderList() {
            const codes = getCodes();
            const container = document.getElementById('codesList');
            const countEl = document.getElementById('totalCount');
            countEl.textContent = codes.length;

            if (codes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span>📋</span>
                        No agent codes generated yet
                    </div>`;
                return;
            }
